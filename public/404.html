<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Vortex Project Builder</title>
  <script>
    // SPA fallback for GitHub Pages
    // Redirects unknown paths back to the app so Next.js client-side routing handles them
    var base = '/vortex-project-builder/';
    var path = window.location.pathname;
    if (path.startsWith(base)) {
      var route = path.slice(base.length);
      if (route && route !== 'index.html') {
        window.location.replace(base + '?' + 'p=' + route + window.location.search.replace('?', '&') + window.location.hash);
        document.documentElement.style.display = 'none';
      }
    }
  </script>
</head>
<body></body>
</html>
